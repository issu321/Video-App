{% extends "base.html" %}
{% block title %}Create Account - Video Studio{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="60" height="60" viewBox="0 0 40 40" fill="none">
                <defs>
                    <linearGradient id="authLogo" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#a78bfa"/>
                        <stop offset="100%" style="stop-color:#f472b6"/>
                    </linearGradient>
                </defs>
                <rect width="40" height="40" rx="10" fill="url(#authLogo)"/>
                <polygon points="14,10 30,20 14,30" fill="white"/>
            </svg>
        </div>
        <h2 class="text-center">Create Account</h2>
        <p class="subtitle text-center">Start your video creation journey</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Min. 6 characters" required>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm" class="form-input" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>

        <p class="text-center" style="margin-top: 1.5rem; color: var(--text-dim); font-size: 0.9rem;">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" style="color: var(--primary-light); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
