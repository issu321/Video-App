{% extends "base.html" %}
{% block title %}Sign In - Video Studio{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="60" height="60" viewBox="0 0 40 40" fill="none">
                <defs>
                    <linearGradient id="authLogo" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#a78bfa"/>
                        <stop offset="100%" style="stop-color:#f472b6"/>
                    </linearGradient>
                </defs>
                <rect width="40" height="40" rx="10" fill="url(#authLogo)"/>
                <polygon points="14,10 30,20 14,30" fill="white"/>
            </svg>
        </div>
        <h2 class="text-center">Welcome Back</h2>
        <p class="subtitle text-center">Sign in to continue creating</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </form>

        <p class="text-center" style="margin-top: 1.5rem; color: var(--text-dim); font-size: 0.9rem;">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" style="color: var(--primary-light); font-weight: 600; text-decoration: none;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
